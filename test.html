      <div>
        <script>
          class LifoArray {
            constructor(size) {
              this.array = new Array(size).fill(0);
            }
            push(value) {
              for (let i = 0; i < this.array.length - 1; i++) {
                this.array[i] = this.array[i + 1];
              }
              this.array[this.array.length - 1] = value;
            }
            getArray() {
              return this.array;
            }
          }
          var ws,
            E = function (id) {
              return document.getElementById(id);
            };
          var url = E('url'),
            connect = E('connect'),
            message = E('message'),
            send = E('send'),
            log = E('log');
          chart1 = E('chart1');
          chart2 = E('chart2');
          chart3 = E('chart3');
          chart4 = E('chart4');
          var enable = function (en) {
            message.disabled = send.disabled = !en;
            url.disabled = en;
            connect.innerHTML = en ? 'disconnect' : 'connect';
          };
          enable(false);
          var date = function (t) {
            return new Date(t * 1000).toISOString().replace(/T/, ' ').replace(/\..+/, '');
          };
          var time = function (t) {
            var d = new Date(t * 1000);
            return `${d.getMinutes()}:${d.getSeconds()}`;
          };
          var validatePacket = function (buffer) {
            const view = new DataView(buffer);
            if (view.getUint8(0) !== 0xaa) return false;
            const rec = view.getUint8(10);
            let calc = 0;
            for (let i = 0; i < 10; i++) calc ^= view.getUint8(i);
            return rec === calc;
          };
          var decode = function (buffer) {
            const view = new DataView(buffer);
            let offset = 0;
            var object = { header: {}, metrics: {} };
            object.header.magic = view.getUint8(offset, true);
            offset += 1;
            object.header.version = view.getUint8(offset, true);
            offset += 1;
            object.header.packet_type = view.getUint16(offset, true);
            offset += 2;
            object.header.timestamp = view.getUint32(offset, true);
            offset += 4;
            object.header.data_length = view.getUint16(offset, true);
            offset += 2;
            object.header.checksum = view.getUint8(offset, true);
            offset += 1;

            object.metrics.timestamp = view.getUint32(offset, true);
            offset += 4;
            object.metrics.cpu_usage = view.getUint16(offset, true) / 100;
            offset += 2;
            object.metrics.mem_usage = view.getUint16(offset, true) / 100;
            offset += 2;
            object.metrics.net_rx = view.getUint32(offset, true) / 8000;
            offset += 4;
            object.metrics.net_tx = view.getUint32(offset, true) / 8000;
            offset += 4;
            object.metrics.load_1min = view.getUint16(offset, true) / 100;
            offset += 2;
            object.metrics.load_5min = view.getUint16(offset, true) / 100;
            offset += 2;
            object.metrics.load_15min = view.getUint16(offset, true) / 100;
            offset += 2;
            object.metrics.nr_running = view.getUint32(offset, true);
            offset += 4;
            object.metrics.nr_total = view.getUint32(offset, true);
            offset += 4;
            object.metrics.du_usage = view.getUint16(offset, true) / 100;
            offset += 2;
            object.metrics.du_total_bytes = view.getBigUint64(offset, true);
            offset += 8;
            object.metrics.du_free_bytes = view.getBigUint64(offset, true);
            offset += 8;
            object.metrics.flags = view.getUint8(offset, true);
            return object;
          };
          var out = function (packet) {
            const metrics = packet.metrics;
            const header = packet.header;
            log.innerHTML += 'HEADER: ' + '<br/>';
            log.innerHTML +=
              'magic: ' + header.magic + ', version: ' + header.version + ', type: ' + header.packet_type + '<br/>';
            log.innerHTML += 'timestamp: ' + date(header.timestamp) + '<br/>';
            log.innerHTML += 'lenth: ' + header.data_length + ', checksum: ' + header.checksum + '<br/>';
            log.innerHTML += 'METRICS: ' + '<br/>';
            log.innerHTML += 'timestamp: ' + date(metrics.timestamp) + '<br/>';
            log.innerHTML += 'cpu: ' + metrics.cpu_usage + '%, mem: ' + metrics.mem_usage + '%' + '<br/>';
            log.innerHTML += 'net: ' + metrics.net_rx.toFixed(4) + '/' + metrics.net_tx.toFixed(4) + '<br/>';
            log.innerHTML +=
              'load: ' +
              metrics.load_1min +
              ' ' +
              metrics.load_5min +
              ' ' +
              metrics.load_15min +
              ' ' +
              metrics.nr_running +
              '/' +
              metrics.nr_total +
              '<br/>';
            log.innerHTML +=
              'du: ' +
              metrics.du_usage +
              '%/' +
              (Number(metrics.du_total_bytes) / 1024 / 1024 / 1024).toFixed(1) +
              ' GB/' +
              (Number(metrics.du_free_bytes) / 1024 / 1024 / 1024).toFixed(1) +
              ' GB/' +
              '<br/>';
            metrics.alerts = {
              high_cpu: !!(metrics.flags & 0x01),
              high_mem: !!(metrics.flags & 0x02),
              high_load: !!(metrics.flags & 0x04),
              load_decrease: !!(metrics.flags & 0x08),
              load_increase: !!(metrics.flags & 0x10),
              network_down: !!(metrics.flags & 0x20),
              disk_full: !!(metrics.flags & 0x40),
              disk_low: !!(metrics.flags & 0x80),
            };
            log.innerHTML += 'ALERTS:' + '<br/>';
            if (metrics.alerts.high_cpu) log.innerHTML += 'high_cpu; ';
            if (metrics.alerts.high_mem) log.innerHTML += 'high_mem; ';
            if (metrics.alerts.high_load) log.innerHTML += 'high_load; ';
            if (metrics.alerts.load_decrease) log.innerHTML += 'load_decrease; ';
            if (metrics.alerts.load_increase) log.innerHTML += 'load_increase; ';
            if (metrics.alerts.network_down) log.innerHTML += 'network_down; ';
            if (metrics.alerts.disk_full) log.innerHTML += 'disk_full; ';
            if (metrics.alerts.disk_low) log.innerHTML += 'disk_low; ';
            log.innerHTML += '<br/><br/>';
          };

          var t1_lsds = new LifoArray(20);
          var t1_ds1 = new LifoArray(20);
          var t1_ds2 = new LifoArray(20);
          var update = function (m) {
            t1_lsds.push(time(m.timestamp));
            track1.data.labels = t1_lsds.getArray();

            t1_ds1.push(m.cpu_usage);
            track1.data.datasets[0].data = t1_ds1.getArray();
            // console.log(track1.data.datasets[0].data, m);

            t1_ds2.push(m.mem_usage);
            track1.data.datasets[1].data = t1_ds2.getArray();
            track1.update();
          };
          connect.onclick = function () {
            if (ws) {
              ws.close();
              return;
            }
            ws = new WebSocket(url.value);
            if (!ws) return;
            ws.onopen = function () {
              log.innerHTML += 'CONNECTION OPENED<br/>';
            };
            ws.onmessage = function (ev) {
              if (ev.data instanceof Blob) {
                const reader = new FileReader();
                reader.onload = function () {
                  const uint8arr = new Uint8Array(reader.result);
                  const isValid = validatePacket(uint8arr.buffer);
                  const packet = isValid && decode(uint8arr.buffer);
                  isValid && out(packet);
                  isValid && update(packet.metrics);
                };
                reader.readAsArrayBuffer(ev.data);
              } else log.innerHTML += 'RECEIVED: ' + ev.data + '<br/>';
            };
            ws.onerror = function (ev) {
              log.innerHTML += 'ERROR: ' + ev + '<br/>';
            };
            ws.onclose = function () {
              log.innerHTML += 'CONNECTION CLOSED<br/>';
              enable(false);
              ws = null;
            };
            enable(true);
          };
          send.onclick = function () {
            if (!ws) return;
            log.innerHTML += 'SENT: ' + message.value + '<br/>';
            ws.send(message.value);
          };
          var ctx1 = chart1.getContext('2d');
          var track1 = new Chart(ctx1, {
            type: 'line',
            data: {
              labels: new Array(20).fill(0),
              datasets: [
                {
                  label: 'CPU, %',
                  data: new Array(20).fill(0),
                  borderWidth: 0.5,
                  borderColor: 'rgba(180, 0, 0, 1)',
                  backgroundColor: 'rgba(180, 0, 0, 0.5)',
                  tension: 0,
                  fill: true,
                  pointRadius: 0,
                  stepped: true,
                },
                {
                  label: 'Memory, %',
                  data: new Array(20).fill(0),
                  borderWidth: 0.5,
                  borderColor: 'rgba(25, 25, 35, 1)',
                  backgroundColor: 'rgba(25, 25, 35, 0.2)',
                  tension: 0,
                  fill: true,
                  pointRadius: 0,
                  stepped: true,
                },
              ],
            },
            options: {
              responsive: false,
              interaction: {
                intersect: false,
                axis: 'x',
              },
              animation: {
                  duration: 0
              },
              scales: {
                y: {
                  min: 0, // Set minimum value for y-axis
                  max: 100, // Set maximum value for y-axis
                  ticks: {
                    stepSize: 10 // Optional: set step size for ticks
                  }
                }
              },
              plugins: {
                legend: {
                  position: 'bottom',
                },
                title: {
                  display: true,
                  text: 'Track #1 - CPU/Memory',
                },
              },
              
            },
          });
          var ctx2 = chart2.getContext('2d');
          var track2 = new Chart(ctx2, {
            type: 'line',
            data: {
              labels: new Array(10).fill(0),
              datasets: [
                {
                  label: 'Net received, kB/s',
                  data: new Array(10).fill(0),
                  borderColor: 'rgba(75, 192, 192, 1)',
                  backgroundColor: 'rgba(75, 192, 192, 0.2)',
                  tension: 0.3,
                  fill: true,
                  pointRadius: 4,
                },
                {
                  label: 'Net transmitted, kB/s',
                  data: new Array(10).fill(0),
                  borderColor: 'rgba(175, 192, 192, 1)',
                  backgroundColor: 'rgba(95, 192, 192, 0.2)',
                  tension: 0.3,
                  fill: true,
                  pointRadius: 4,
                },
              ],
            },
            options: {
              responsive: false,
              plugins: {
                legend: {
                  position: 'bottom',
                },
                title: {
                  display: true,
                  text: 'Track #2 - Network',
                },
              },
            },
          });
          var ctx3 = chart3.getContext('2d');
          var track3 = new Chart(ctx3, {
            type: 'line',
            data: {
              labels: new Array(10).fill(0),
              datasets: [
                {
                  label: 'Usage, percentage',
                  data: new Array(10).fill(0),
                  borderColor: 'rgba(75, 192, 192, 1)',
                  backgroundColor: 'rgba(75, 192, 192, 0.2)',
                  tension: 0.3,
                  fill: true,
                  pointRadius: 4,
                },
                {
                  label: 'Total, GB',
                  data: new Array(10).fill(0),
                  borderColor: 'rgba(75, 192, 192, 1)',
                  backgroundColor: 'rgba(75, 192, 192, 0.2)',
                  tension: 0.3,
                  fill: true,
                  pointRadius: 4,
                },
                {
                  label: 'Free, GB',
                  data: new Array(10).fill(0),
                  borderColor: 'rgba(75, 192, 192, 1)',
                  backgroundColor: 'rgba(75, 192, 192, 0.2)',
                  tension: 0.3,
                  fill: true,
                  pointRadius: 4,
                },
              ],
            },
            options: {
              responsive: false,
              plugins: {
                legend: {
                  position: 'bottom',
                },
                title: {
                  display: true,
                  text: 'Track #3 - Disk usage',
                },
              },
            },
          });
          var ctx4 = chart4.getContext('2d');
          var track4 = new Chart(ctx4, {
            type: 'line',
            data: {
              labels: new Array(10).fill(0),
              datasets: [
                {
                  label: '1 min',
                  data: new Array(10).fill(0),
                  borderColor: 'rgba(75, 192, 192, 1)',
                  backgroundColor: 'rgba(75, 192, 192, 0.2)',
                  tension: 0.3,
                  fill: true,
                  pointRadius: 4,
                },
                {
                  label: '5 min',
                  data: new Array(10).fill(0),
                  borderColor: 'rgba(75, 192, 192, 1)',

                {

                  tension: 0.3,
                  fill: true,
                  pointRadius: 4,
                },
              ],
            },
            options: {

                },
                title: {

                },

            },
          });
        </script>
      </div>
