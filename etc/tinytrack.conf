# TinyTrack Configuration File
# Location: /etc/tinytrack/tinytrack.conf or ~/.tinytrack.conf

[daemon]
user = tinytd
group = tinytd
pid_file = /var/run/tinytd.pid

# Log level: debug, info, notice, warning, error
log_level = debug

[collection]
# Sampling interval in milliseconds
interval_ms = 1000

# Disk usage check interval in seconds
du_interval_sec = 30

# Disk usage check path
du_path = /home

[storage]
# Live mmap (in RAM, tmpfs)
live_path = /dev/shm/tinytd-live.dat

# Shadow mmap (persistent, survives reboot)
shadow_path = /dev/shm/tinytd-shadow.dat
# shadow_path = /var/lib/tinytrack/shadow.dat

shadow_sync_interval_sec = 60

# File permissions (decimal representation of octal mode)
# 420 = 0644 octal = rw-r--r-- (recommended)
# 438 = 0666 octal = rw-rw-rw-
# 384 = 0600 octal = rw-------
file_mode = 420

[ringbuffer]
# L1: 1 hour @ 1 second interval (3600 samples)
l1_capacity = 60 # 3600

# L2: 24 hours @ 1 minute interval (1440 samples)
l2_capacity = 60 # 1440
l2_aggregate_interval = 60

# L3: 7 days @ 1 hour interval (168 samples)
l3_capacity = 24 # 168
l3_aggregate_interval = 3600

[recovery]
enable_crc = true
auto_recover = true

[gateway]
# WebSocket/HTTP gateway listen address
listen = ws://0.0.0.0:4026

# Update interval for WebSocket clients (milliseconds)
update_interval = 1000
