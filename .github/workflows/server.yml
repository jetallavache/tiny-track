name: Server — Build, Test, Docker

on:
  push:
    branches: [main]
    tags:
      - 'server/v*'
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/tinytrack

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc make autoconf automake libtool pkg-config \
            libssl-dev libncurses-dev

      - name: Bootstrap & configure
        run: ./bootstrap.sh && ./configure
        working-directory: server

      - name: Build
        run: make -j$(nproc)
        working-directory: server

      - name: Run unit tests
        run: make test-unit
        working-directory: server

      - name: Run gateway tests (if server available)
        run: make test-gateway || true   # non-fatal: needs live server
        working-directory: server

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || startsWith(github.ref, 'refs/tags/server/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=server/v(\d+\.\d+\.\d+),group=1
            type=match,pattern=server/v(\d+\.\d+),group=1
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
