name: SDK Lite — Test & npm publish

on:
  push:
    tags:
      - 'sdk-lite/v*'        # trigger: git tag sdk-lite/v0.7.0
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk-lite/package-lock.json

      - name: Install
        run: npm ci
        working-directory: sdk-lite

      - name: Type check
        run: npx tsc --noEmit
        working-directory: sdk-lite

      - name: Build
        run: npm run build
        working-directory: sdk-lite

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: sdk-lite

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sdk-lite/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdk-lite/package-lock.json

      - name: Install & build
        run: npm ci && npm run build
        working-directory: sdk-lite

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: sdk-lite

      - name: Publish to npm
        run: npm publish --access public ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: sdk-lite
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
