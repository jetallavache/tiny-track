<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#16A085"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="480" height="120" rx="10" fill="url(#bg)"/>

  <!-- pulse icon -->
  <polyline points="18,60 34,60 42,30 54,90 66,45 74,60 90,60"
    fill="none" stroke="url(#accent)" stroke-width="3"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- title -->
  <text x="108" y="52" font-family="'Courier New', monospace" font-size="32"
    font-weight="bold" fill="#F0F0F0" letter-spacing="2">TinyTrack</text>

  <!-- subtitle -->
  <text x="110" y="76" font-family="'Courier New', monospace" font-size="13"
    fill="#4A90D9" letter-spacing="1">system metrics · websocket · zero-copy</text>

  <!-- version badge -->
  <rect x="108" y="88" width="72" height="18" rx="4" fill="#4A90D9" opacity="0.2"/>
  <text x="144" y="101" font-family="'Courier New', monospace" font-size="11"
    fill="#4A90D9" text-anchor="middle">v0.1.6</text>

  <!-- MIT badge -->
  <rect x="188" y="88" width="44" height="18" rx="4" fill="#27AE60" opacity="0.2"/>
  <text x="210" y="101" font-family="'Courier New', monospace" font-size="11"
    fill="#27AE60" text-anchor="middle">MIT</text>

  <!-- Linux badge -->
  <rect x="240" y="88" width="52" height="18" rx="4" fill="#E67E22" opacity="0.2"/>
  <text x="266" y="101" font-family="'Courier New', monospace" font-size="11"
    fill="#E67E22" text-anchor="middle">Linux</text>
</svg>
