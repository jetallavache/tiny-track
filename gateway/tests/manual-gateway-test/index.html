<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyTrack Gateway Manual Test</title>
    <style>
      body { font-family: monospace; padding: 20px; }
      .section { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
      button { padding: 5px 10px; margin: 5px; }
      input { padding: 5px; margin: 5px; }
      #metrics { background: #f0f0f0; padding: 10px; min-height: 100px; }
      #log { background: #eee; height: 300px; overflow-y: scroll; padding: 10px; }
    </style>
  </head>
  <body>
    <h1>TinyTrack Gateway - Manual Test Client</h1>
    
    <div class="section">
      <h2>HTTP API Test</h2>
      <input id="apiUrl" type="text" value="http://localhost:4026/api/metrics/live" style="width: 400px" />
      <button id="fetchMetrics">Fetch Metrics</button>
    </div>

    <div class="section">
      <h2>WebSocket Test</h2>
      <input id="wsUrl" type="text" value="ws://localhost:4026/websocket" style="width: 400px" />
      <button id="wsConnect">Connect</button>
      <button id="wsDisconnect">Disconnect</button>
      <div id="wsStatus">Disconnected</div>
      <br>
      <label>Update Interval (ms):</label>
      <input id="intervalInput" type="number" value="1000" min="1000" max="60000" step="1000" />
      <button id="setInterval">Set Interval</button>
    </div>

    <div class="section">
      <h2>Metrics Display</h2>
      <div id="metrics">Waiting for data...</div>
    </div>

    <div class="section">
      <h2>Event Log</h2>
      <button id="clearLog">Clear Log</button>
      <div id="log"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
