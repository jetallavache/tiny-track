[daemon]
log_level = debug

[collection]
interval_ms = 500
du_interval_sec = 10
du_path = /tmp

[storage]
live_path   = /tmp/tinytd-test-live.dat
shadow_path = /tmp/tinytd-test-shadow.dat
shadow_sync_interval_sec = 1
file_mode = 0644

[ringbuffer]
l1_capacity = 20
l2_capacity = 10
l3_capacity = 5
l2_aggregate_interval = 10
l3_aggregate_interval = 60

[recovery]
enable_crc   = false
auto_recover = true
