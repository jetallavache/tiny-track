# =============================================================================
# TinyTrack Daemon Configuration
# =============================================================================
#
# Default location: /etc/tinytrack/tinytrack.conf
# User override:    ~/.tinytrack.conf
#
# After editing this file, restart the daemons:
#   systemctl restart tinytd tinytrack
#
# =============================================================================

[tinytd]

# User and group the daemon drops privileges to after startup.
# The user and group must exist on the system. To create them:
#   groupadd --system tinytd
#   useradd --system --no-create-home --shell /usr/sbin/nologin --gid tinytd tinytd
user  = tinytd
group = tinytd

# Path to the PID file. Written on startup, removed on clean shutdown.
pid_file = /var/run/tinytd.pid

# Log output backend.
# auto    - select automatically: journal if available, syslog otherwise
# stderr  - write to standard error (useful for foreground/debug runs)
# stdout  - write to standard output with timestamp
# docker  - write to stdout without timestamp (Docker adds it via --log-opt)
# syslog  - traditional UNIX syslog
# journal - systemd journal (preferred on systemd-based systems)
log_backend = auto

# Minimum log level. Messages below this level are suppressed.
# debug < info < notice < warning < error
log_level = info


[collection]

# How often metrics are sampled, in milliseconds.
# Lower values increase resolution but also CPU and memory usage.
# Minimum recommended value: 100. Default: 1000 (1 second).
interval_ms = 1000

# How often disk usage (statvfs on rootfs_path) is recalculated, in seconds.
# statvfs is more expensive than /proc reads, so it is sampled less frequently.
du_interval_sec = 30

# Path to the root filesystem to monitor.
# Disk usage (statvfs) is measured on this path.
# In a Docker container that bind-mounts the host's /: set to /host/rootfs.
# Override at runtime with the TT_ROOTFS_PATH environment variable.
rootfs_path = /

# Path to the host's /proc filesystem.
# In a Docker container that bind-mounts the host's /proc: set to /host/proc.
# Override at runtime with the TT_PROC_ROOT environment variable.
proc_root = /proc


[storage]

# Path to the live ring buffer file (shared memory / tmpfs).
# Consumers (tiny-cli, tinytrack gateway) read metrics from this file
# via mmap. Must reside on a tmpfs mount (e.g. /dev/shm) for zero-copy
# performance. The file is recreated on every daemon start.
live_path = /dev/shm/tinytd-live.dat

# Path to the shadow (persistent) copy of the ring buffer.
# Written to disk periodically and used to restore metrics after a
# restart or crash. Must reside on a persistent filesystem.
shadow_path = /var/lib/tinytrack/tinytd-shadow.dat

# How often the live buffer is synced to the shadow file, in seconds.
shadow_sync_interval_sec = 60

# Permissions for the live and shadow files (decimal form of octal mode).
# 416 = 0640 = rw-r-----  readable by group only (recommended)
# 432 = 0660 = rw-rw----  readable by group with write
# 384 = 0600 = rw-------  readable by daemon user only
file_mode = 416


[ringbuffer]

# The ring buffer stores metrics in three levels (L1/L2/L3) with
# decreasing resolution and increasing retention. L2 and L3 are
# populated by aggregating the previous level on a fixed interval.
#
# Memory usage per level = capacity * sizeof(tt_metrics) (~64 bytes).

# L1 — high-resolution ring. One entry per collection interval.
# 3600 = 1 hour @ 1 s interval (recommended)
l1_capacity = 3600

# L2 — medium-resolution ring. Aggregated from L1.
# l2_agg_interval_sec: how many seconds of L1 samples are merged into one L2 entry.
# l2_capacity=1440, l2_agg_interval_sec=60  -> 24 hours @ 1 min resolution
l2_capacity         = 1440
l2_agg_interval_sec = 60

# L3 — low-resolution ring. Aggregated from L2.
# l3_capacity=720, l3_agg_interval_sec=3600  -> 30 days @ 1 h resolution
l3_capacity         = 720
l3_agg_interval_sec = 3600


[recovery]

# Verify ring buffer integrity using Adler-32 checksum on recovery.
enable_crc = true

# Restore the ring buffer from the shadow file on startup.
# When disabled, the daemon always starts with an empty ring buffer.
auto_recover = true


[gateway]

# User and group the gateway drops privileges to after startup.
# groupadd --system tinytrack
# useradd --system --no-create-home --shell /usr/sbin/nologin --gid tinytrack tinytrack
user  = tinytrack
group = tinytrack

# Path to the PID file.
pid_file = /var/run/tinytrack.pid

# Log output backend. Same options as [tinytd].
log_backend = auto

# Minimum log level.
log_level = info

# Address and port the HTTP/WebSocket gateway listens on.
# Use 0.0.0.0 to listen on all interfaces, or a specific IP to bind to one.
hostname = 0.0.0.0
port     = 25015

# Enable TLS (wss://). Requires tls_cert and tls_key to be set below.
# tls = false

# How often the gateway pushes metric updates to WebSocket clients, in ms.
# Should be >= collection.interval_ms to avoid sending duplicate data.
update_interval = 1000

# ---------------------------------------------------------------------------
# Safety limits
# ---------------------------------------------------------------------------

# Maximum number of simultaneous WebSocket/HTTP connections.
# Incoming connections beyond this limit are rejected immediately.
max_connections = 128

# Close connections that do not complete the HTTP upgrade within N ms.
# Protects against slowloris and half-open connections.
header_timeout_ms = 5000

# Close idle WebSocket connections after N ms of inactivity (0 = disabled).
# Useful for detecting dead clients that did not send a close frame.
idle_timeout_ms = 0

# Maximum URI length in bytes. Requests with longer URIs receive 414.
max_uri_size = 8192

# Maximum total size of HTTP headers in bytes. Requests exceeding this
# receive 431 Request Header Fields Too Large.
max_headers_size = 16384

# ---------------------------------------------------------------------------
# TLS (optional) — set tls = true above and provide cert/key paths.
#
# Generate a self-signed cert for testing:
#   openssl req -x509 -newkey rsa:4096 -keyout server.key -out server.crt \
#           -days 365 -nodes -subj '/CN=localhost'
# ---------------------------------------------------------------------------
# tls_cert = /etc/tinytrack/server.crt
# tls_key  = /etc/tinytrack/server.key
# tls_ca   = /etc/tinytrack/ca.crt

# ---------------------------------------------------------------------------
# CORS (optional)
# ---------------------------------------------------------------------------
# Allowed origins for browser clients. Options:
#   *                                    — allow all origins (dev only, no credentials)
#   http://localhost:3000                — single origin
#   http://localhost:3000,https://dashboard.example.com  — whitelist
# Leave commented out to disable CORS headers entirely (safest for prod
# when the dashboard is served from the same host).
#
# cors_origins = *

# ---------------------------------------------------------------------------
# Authentication (optional)
# ---------------------------------------------------------------------------
# Shared secret for WebSocket clients. Leave commented out to disable auth.
# Clients must either:
#   A) Send "Authorization: Bearer <token>" in the HTTP upgrade request, or
#   C) Send CMD_AUTH with the token as the first WS message.
#
auth_token      = qwerty
auth_timeout_ms = 5000
