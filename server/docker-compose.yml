services:
  tinytrack:
    build: .
    image: tinytrack:latest
    restart: unless-stopped
    ports:
      - "25015:25015"
    volumes:
      - /proc:/host/proc:ro
      - /:/host/rootfs:ro
      - /dev/shm:/dev/shm
      # Optional: mount custom config (overrides ENV vars)
      # - ./etc/tinytrack.conf-docker:/etc/tinytrack/tinytrack.conf:ro
      # Optional: mount TLS certificates
      # - ./etc/certs:/etc/tinytrack/certs:ro
      # Persistent shadow storage
      - tinytrack-data:/var/lib/tinytrack
    environment:
      TT_PROC_ROOT: /host/proc
      TT_ROOTFS_PATH: /host/rootfs
      # TT_HOSTNAME: 0.0.0.0
      # TT_PORT: 25015
      # TT_AUTH_TOKEN: changeme
      # TT_TLS: true
      # TT_TLS_CERT: /etc/tinytrack/certs/server.crt
      # TT_TLS_KEY:  /etc/tinytrack/certs/server.key
      # TT_LOG_LEVEL: info
      # TT_INTERVAL_MS: 1000
      # TT_L1_CAPACITY: 3600

volumes:
  tinytrack-data:
